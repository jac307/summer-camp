<!DOCTYPE html>
<html lang="en-CA">
  <head>
    <meta charset="utf-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    >

    <title>DaVinci Resolve Tutorials</title>

    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

    <!-- Vuetify 3 -->
    <link
      href="https://cdn.jsdelivr.net/npm/vuetify@3.9.2/dist/vuetify.min.css"
      rel="stylesheet"
    >
    <script src="https://cdn.jsdelivr.net/npm/vuetify@3.9.2/dist/vuetify.min.js"></script>

    <!-- Material Design Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/@mdi/font@7.x/css/materialdesignicons.min.css"
      rel="stylesheet"
    >
  </head>

  <body>
    <div id="app">
      <v-app>
        <v-navigation-drawer
          v-model="drawer"
          aria-label="Tutorial navigation"
        >
          <v-list nav>
            <template
              v-for="(item, index) in items"
              :key="index"
            >
              <v-list-group
                v-if="item.children"
                :value="item.title"
              >
                <template #activator="{ props }">
                  <v-list-item
                    v-bind="props"
                    :title="item.title"
                    @click="selectItem(item)"
                  ></v-list-item>
                </template>

                <v-list-item
                  v-for="(child, childIndex) in item.children"
                  :key="childIndex"
                  :title="child.title"
                  @click="selectItem(child)"
                ></v-list-item>
              </v-list-group>

              <v-list-item
                v-else
                :title="item.title"
                @click="selectItem(item)"
              ></v-list-item>
            </template>
          </v-list>
        </v-navigation-drawer>

        <v-app-bar>
          <v-app-bar-nav-icon
            aria-label="Open or close tutorial menu"
            @click="drawer = !drawer"
          ></v-app-bar-nav-icon>

          <v-app-bar-title>
            {{ selectedItem?.title || "DaVinci Resolve Tutorials" }}
          </v-app-bar-title>

          <v-btn
            variant="outlined"
            href="https://jac307.github.io/summer-camp/"
            class="ml-auto mr-4"
          >
            Home
          </v-btn>
        </v-app-bar>

        <v-main>
          <v-container class="pa-4">
            <v-card
              v-if="selectedItem"
              variant="outlined"
            >
              <v-card-text
                v-if="selectedItem.description"
                v-html="selectedItem.description"
              ></v-card-text>

              <v-divider
                v-if="selectedItem.description && selectedItem.tutorialEmbedCode"
                class="my-4"
              ></v-divider>

              <iframe
                v-if="selectedItem.tutorialEmbedCode"
                :src="selectedItem.tutorialEmbedCode"
                :title="selectedItem.title + ' interactive tutorial'"
                width="100%"
                height="500"
                style="width: 100%; height: 500px; border: 0; border-bottom: 1px solid #ccc;"
                referrerpolicy="strict-origin-when-cross-origin"
                allow="camera; microphone; clipboard-write"
                sandbox="allow-scripts allow-forms allow-same-origin allow-presentation allow-downloads allow-modals allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation"
                allowfullscreen
              ></iframe>
            </v-card>
          </v-container>
        </v-main>
      </v-app>
    </div>

    <script src="./vue.js"></script>
  </body>
</html>
