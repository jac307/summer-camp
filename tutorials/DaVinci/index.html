<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <title>Vuetify CDN Example</title>

    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

    <!-- Vuetify 3 -->
    <link
      href="https://cdn.jsdelivr.net/npm/vuetify@3.9.2/dist/vuetify.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/vuetify@3.9.2/dist/vuetify.min.js"></script>

    <!-- Material Design Icons (for nav icon) -->
    <link
      href="https://cdn.jsdelivr.net/npm/@mdi/font@7.x/css/materialdesignicons.min.css"
      rel="stylesheet"
    />
  </head>

  <body>
    <div id="app">
        <v-app id="inspire">
            <v-navigation-drawer v-model="drawer">        
                <v-list>               
                 
                    <template v-for="(item, index) in items" :key="index">
                        <v-list-group v-if="item.children" :value="false">
                          <!-- 👇 Custom activator slot so parent item is clickable -->
                          <template #activator="{ props }">
                            <v-list-item
                              v-bind="props"
                              :title="item.title"
                              @click="selectItem(item)"
                            />
                          </template>
                      
                          <v-list-item
                            v-for="(child, cIndex) in item.children"
                            :key="cIndex"
                            :title="child.title"
                            @click="selectItem(child)"
                          />                        
                        </v-list-group>
                      
                        <!-- regular item -->
                        <v-list-item
                          v-else
                          :title="item.title"
                          @click="selectItem(item)"
                        />
                      </template>
                      
                </v-list>
              </v-navigation-drawer>
              
        
            <v-app-bar>
              <v-app-bar-nav-icon @click="drawer = !drawer"></v-app-bar-nav-icon>
        
              <v-app-bar-title>{{ selectedItem?.title || "Default Title" }}</v-app-bar-title>
              <v-btn variant="outlined " href="https://jac307.github.io/MediaArtTutorials/" class="ml-auto" text>
                Home
              </v-btn>
            </v-app-bar>
        
            <v-main>
                <v-container class="pa-4">
                    <v-card
                       v-if="selectedItem"
                        outlined
                        >
                    <!-- <v-card-title>{{selectedItem.title}}</v-card-title> -->
                    <v-card-text v-html="selectedItem?.description"></v-card-text>
                     <v-divider class="my-4"></v-divider>

                             <!-- Reusable iframe -->
              <iframe
              v-if="selectedItem.tutorialEmbedCode"
              :src="selectedItem.tutorialEmbedCode"
              width="100%"
              height="500px"
              style="width: 100%; height: 500px; border-bottom: 1px solid #ccc;"
              referrerpolicy="strict-origin-when-cross-origin"
              frameborder="0"
              webkitallowfullscreen
              mozallowfullscreen
              allowfullscreen
              allow="camera; microphone; clipboard-write"
              sandbox="allow-scripts allow-forms allow-same-origin allow-presentation allow-downloads allow-modals allow-popups allow-popups-to-escape-sandbox allow-top-navigation allow-top-navigation-by-user-activation"
            ></iframe>


                 
                    </v-card>                  
                    
                  </v-container>
            </v-main>
          </v-app>
    </div>
    <script type="module" src="vue.js"></script> 

   
  </body>
</html>
